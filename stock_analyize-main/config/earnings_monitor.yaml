# ============================================
# 财报披露监控配置 earnings_monitor.yaml
# ============================================
# 支持 A 股 / 港股 / 美股三市场。
#
# 数据源：
#   A 股：akshare stock_yjyg_em / stock_yjkb_em / stock_yjbb_em / stock_yysj_em
#   港股：基于财报历史 + 6 个月周期推导（akshare 无直接披露日历）
#   美股：yfinance Ticker.calendar
# ============================================

watchlist:
  a:
    - "600519"   # 贵州茅台
    - "000001"   # 平安银行
    - "002156"   # 通富微电
  hk:
    - "00700"    # 腾讯控股
    - "09988"    # 阿里巴巴-SW
  us:
    - "AAPL"
    - "TSLA"
    - "NVDA"

# 向前看多少天的披露事件
days_ahead: 30

# 披露日前 N 天开始推送"披露提醒"
remind_days_ahead: 3

# 是否推送业绩预告（信息价值高，通常在披露日前数周发布）
track_forecasts: true

# 同事件冷却窗口（小时）
cooldown_hours: 72
