# 股票筛选策略配置文件
# 所有策略存放在 strategies 键下，支持多方案并行或勾选
strategies:
  # ========== 原有策略 ==========
  bottom_divergence:
    name: "周线底背离方案(优化版)"
    conditions:
      - type: exclude_st               # 排除ST股
      - type: exclude_delisting_risk   # 排除退市风险
      - type: exclude_recent_large_unlock    # 排除近期大额解禁
      - type: market_cap
        min: 50
        max: 2000
      - type: pe_range
        min: 0
        max: 30
      - type: weekly_macd_divergence
        lookback_bars: 60
        zero_axis_filter: true  # 新增：零轴过滤，剔除弱势深度背离
        multi_level_check: true # 新增：多级背离检测，不漏早期筑底信号
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 50

  double_breakout:
    name: "双突破方案"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 50
        max: 2000
      - type: box_breakout
        lookback_bars: 20
        breakout_pct: 0.02
        consolidation_pct: 0.10
      - type: downtrend_breakout
        lookback_bars: 60
        min_touches: 2
        breakout_pct: 0.01
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 50

  value_investing:
    name: "白马价值筛选"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 500
        max: 50000
      - type: pe_range
        min: 0
        max: 20
      - type: price_above_ma
        ma_period: 250
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 20

  # ========== 新增高胜率策略 ==========
  ma_long_bull:
    name: "均线全多头共振策略"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 50
        max: 2000
      - type: pe_range
        min: 0
        max: 40
      - type: multi_ma_bull
        ma_list: [5,10,20,60,250]
        require_all_above: true
        require_up_trend: true
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 30

  break_250_vol:
    name: "放量突破年线策略"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 50
        max: 2000
      - type: pe_range
        min: 0
        max: 35
      - type: price_above_ma
        ma_period: 250
      - type: volume_break
        lookback_bars: 20
        vol_multiple: 1.5
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 30

  weekly_macd_resonance:
    name: "周线底背离+金叉共振"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 50
        max: 2000
      - type: pe_range
        min: 0
        max: 30
      - type: weekly_macd_divergence
        lookback_bars: 60
      - type: weekly_macd_gold_cross
        require_zero_near: true
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 40

  pullback_stabilize:
    name: "趋势股缩量回踩企稳"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 50
        max: 2000
      - type: pe_range
        min: 0
        max: 40
      - type: price_above_ma
        ma_period: 60
      - type: volume_shrink
        lookback_bars: 10
        shrink_ratio: 0.6
      - type: support_ma
        ma_period: 20
        close_touch: true
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 30

  value_growth:
    name: "低估值高ROE成长策略"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 200
        max: 10000
      - type: pe_range
        min: 5
        max: 25
      - type: roe_filter
        min_roe: 10
      - type: price_above_ma
        ma_period: 250
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 25

  triple_breakout:
    name: "三重突破最强趋势策略"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: exclude_recent_unlock
      - type: market_cap
        min: 50
        max: 2000
      - type: pe_range
        min: 0
        max: 35
      - type: box_breakout
        lookback_bars: 20
        breakout_pct: 0.02
        consolidation_pct: 0.10
      - type: downtrend_breakout
        lookback_bars: 60
        min_touches: 2
        breakout_pct: 0.01
      - type: volume_break
        lookback_bars: 20
        vol_multiple: 1.4
    output:
      sort_by: "总市值(亿)"
      ascending: false
      limit: 30

  # ========== 科技/半导体股专属策略 ==========
  tech_breakout:
    name: "科技股箱体放量突破"
    conditions:
      - type: exclude_st
      - type: exclude_delisting_risk
      - type: market_cap
        min: 30          # 科技小盘也纳入
        max: 3000
      - type: box_breakout
        lookback_bars: 20
        breakout_pct: 0.02      # 收盘须突破箱顶2%以上
        consolidation_pct: 0.25  # 箱体振幅放宽到25%，适配高弹性科技股
      - type: volume_break
        lookback_bars: 20
        vol_multiple: 1.3       # 放量1.3倍即可（科技股经常情绪化放量）
    output:
      sort_by: "总市值(亿)"
      ascending: true           # 从小市值开始排，弹性更大
      limit: 30